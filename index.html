<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stable Fluids (Stam 2001)</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #05070d;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      #fluid {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
        cursor: crosshair;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        color: #d8e3ff;
        background: rgb(8 13 25 / 70%);
        border: 1px solid rgb(115 146 234 / 30%);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(4px);
        font-size: 13px;
        line-height: 1.45;
        user-select: none;
        min-width: 320px;
      }

      .hud code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .controls {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }

      .control-row {
        display: grid;
        grid-template-columns: 1fr 120px 72px 44px;
        align-items: center;
        gap: 8px;
      }

      .control-row label {
        color: #eef2ff;
      }

      .control-row input[type='range'] {
        width: 100%;
      }

      .control-row input[type='number'] {
        width: 72px;
        background: rgb(7 11 22 / 75%);
        border: 1px solid rgb(115 146 234 / 35%);
        border-radius: 6px;
        color: #d8e3ff;
        padding: 2px 6px;
        font: inherit;
      }

      .control-row select {
        width: 100%;
        background: rgb(7 11 22 / 75%);
        border: 1px solid rgb(115 146 234 / 35%);
        border-radius: 6px;
        color: #d8e3ff;
        padding: 2px 6px;
        font: inherit;
      }

      .control-row--select {
        grid-template-columns: 1fr 120px 124px;
      }

      .control-row--select output {
        text-align: left;
      }

      .control-row output {
        text-align: right;
        color: #9fc2ff;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <canvas id="fluid"></canvas>
    <div class="hud">
      <div><strong>Stable Fluids (Stam 2001)</strong></div>
      <div>ドラッグで流体に力と染料を注入</div>
      <div><code>R</code> でリセット</div>
      <div>FPS: <output id="fpsValue">--</output></div>
      <div>Renderer: <output id="webgpuValue">初期化中...</output></div>
      <div class="controls">
        <div class="control-row">
          <label for="forceAmount">力の量</label>
          <input id="forceAmount" type="range" min="1" max="2600" step="1" value="5" />
          <input id="forceAmountNumber" type="number" min="1" max="2600" step="1" value="5" />
          <output for="forceAmount" id="forceAmountValue">5</output>
        </div>
        <div class="control-row">
          <label for="dyeAmount">染料の量</label>
          <input id="dyeAmount" type="range" min="20" max="2000" step="1" value="20" />
          <input id="dyeAmountNumber" type="number" min="20" max="2000" step="1" value="20" />
          <output for="dyeAmount" id="dyeAmountValue">20</output>
        </div>
        <div class="control-row">
          <label for="dyeBrushSize">染料ブラシサイズ(px)</label>
          <input id="dyeBrushSize" type="range" min="1" max="12" step="1" value="1" />
          <input id="dyeBrushSizeNumber" type="number" min="1" max="12" step="1" value="1" />
          <output for="dyeBrushSize" id="dyeBrushSizeValue">1px</output>
        </div>
        <div class="control-row">
          <label for="forceVelocityResponse">力の移動量応答</label>
          <input id="forceVelocityResponse" type="range" min="-1" max="1" step="0.01" value="1" />
          <input
            id="forceVelocityResponseNumber"
            type="number"
            min="-1"
            max="1"
            step="0.01"
            value="1"
          />
          <output for="forceVelocityResponse" id="forceVelocityResponseValue">1.00</output>
        </div>
        <div class="control-row">
          <label for="dyeVelocityResponse">染料の移動量応答</label>
          <input id="dyeVelocityResponse" type="range" min="-1" max="1" step="0.01" value="0" />
          <input id="dyeVelocityResponseNumber" type="number" min="-1" max="1" step="0.01" value="0" />
          <output for="dyeVelocityResponse" id="dyeVelocityResponseValue">0.00</output>
        </div>
        <div class="control-row">
          <label for="impulseSpacing">注入間隔(px)</label>
          <input id="impulseSpacing" type="range" min="2" max="80" step="1" value="2" />
          <input id="impulseSpacingNumber" type="number" min="2" max="80" step="1" value="2" />
          <output for="impulseSpacing" id="impulseSpacingValue">2.0px</output>
        </div>
        <div class="control-row">
          <label for="clickForceAmount">クリック時の力の強さ</label>
          <input id="clickForceAmount" type="range" min="1" max="120" step="0.1" value="25" />
          <input id="clickForceAmountNumber" type="number" min="1" max="120" step="0.1" value="25" />
          <output for="clickForceAmount" id="clickForceAmountValue">25.0</output>
        </div>
        <div class="control-row">
          <label for="clickDyeAmount">クリック時の染料の量</label>
          <input id="clickDyeAmount" type="range" min="0.1" max="120" step="0.1" value="12" />
          <input id="clickDyeAmountNumber" type="number" min="0.1" max="120" step="0.1" value="12" />
          <output for="clickDyeAmount" id="clickDyeAmountValue">12.0</output>
        </div>
        <div class="control-row">
          <label for="clickRadius">クリック時の半径(px)</label>
          <input id="clickRadius" type="range" min="1" max="24" step="1" value="1" />
          <input id="clickRadiusNumber" type="number" min="1" max="24" step="1" value="1" />
          <output for="clickRadius" id="clickRadiusValue">1px</output>
        </div>
        <div class="control-row control-row--select">
          <label for="simulationResolution">シミュレーション細かさ</label>
          <select id="simulationResolution">
            <option value="1">標準 (1/1)</option>
            <option value="2" selected>高精細 (1/2)</option>
            <option value="4">軽量 (1/4)</option>
            <option value="8">省電力 (1/8)</option>
            <option value="16">超軽量 (1/16)</option>
          </select>
          <output id="simulationResolutionValue">1/2</output>
        </div>
        <div class="control-row control-row--select">
          <label for="aaMode">AA モード</label>
          <select id="aaMode">
            <option value="off">off</option>
            <option value="linear">linear</option>
            <option value="blur">blur</option>
            <option value="fxaa">fxaa相当</option>
          </select>
          <output id="aaModeValue">FXAA相当 (低upscaleでも適用)</output>
        </div>
        <div class="control-row control-row--select">
          <label for="aaStrengthValue">AA 強度(推奨)</label>
          <output id="aaStrengthValue">0.00 (推奨0だが FXAA相当 は適用中)</output>
        </div>
        <div class="control-row control-row--select">
          <label for="impulseInterpolationMode">移動補完</label>
          <select id="impulseInterpolationMode">
            <option value="bezier">ベジェ</option>
            <option value="linear">直線</option>
          </select>
          <output id="impulseInterpolationModeValue">ベジェ</output>
        </div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
