<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stable Fluids (Stam 2001)</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #05070d;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      #fluid {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
        cursor: crosshair;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        color: #d8e3ff;
        background: rgb(8 13 25 / 70%);
        border: 1px solid rgb(115 146 234 / 30%);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(4px);
        font-size: 13px;
        line-height: 1.45;
        user-select: none;
      }

      .hud code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <canvas id="fluid"></canvas>
    <div class="hud">
      <div><strong>Stable Fluids (Stam 2001)</strong></div>
      <div>ドラッグで流体に力と染料を注入</div>
      <div><code>R</code> でリセット</div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
